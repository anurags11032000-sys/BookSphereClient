<section class="edit-wrapper">
    <div class="edit-card">

        <!-- Book Image -->
        <img th:src="@{/getCoverImage(id=${book.id})}" class="edit-image" />

        <!-- Book Details -->
        <div class="book-info">
            <p><strong>Name:</strong> <span th:text="${book.name}"></span></p>
            <p><strong>Price:</strong> ₹ <span th:text="${book.price}"></span></p>
            <p><strong>User:</strong> <span th:text="${book.user.name}"></span></p>
        </div>

        <!-- Update Image -->
        <form action="updateImage" method="post" enctype="multipart/form-data" class="update-form">
            <input type="hidden" name="id" th:value="${book.id}" />
            
            <label class="upload-btn">
                Choose New Image
                <input type="file" name="cImage" accept="image/*" required>
            </label>

            <button class="action-btn">Update Image</button>
        </form>

        <!-- Update PDF -->
        <form action="updatePdf" method="post" enctype="multipart/form-data" class="update-form">
            <input type="hidden" name="id" th:value="${book.id}" />
            
            <label class="upload-btn pdf-upload">
                Choose New PDF
                <input type="file" name="ctn" accept=".pdf" required>
            </label>

            <button class="action-btn">Update PDF</button>
        </form>

        <!-- Update Price -->
        <form action="updatePrice" method="post" class="update-form">
            <input type="hidden" name="id" th:value="${book.id}" />

            <input type="text"
                   pattern="[0-9]+"
                   name="price"
                   th:value="${book.price}"
                   class="price-input"
                   required />

            <button class="action-btn">Update Price</button>
        </form>

    </div>
</section>

</body>
